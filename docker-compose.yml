services:
  sandbox:
    image: faultbench-sandbox:latest
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    volumes:
      - ./tasks:/tasks:ro
      - ./logs:/logs
    environment:
      - PYTHONUNBUFFERED=1
    working_dir: /workspace
    mem_limit: 512m
    cpus: 0.5
    restart: "no"
