# FaultBench Configuration
# ========================
# Global defaults — override with CLI flags or environment variables.

agent:
  default: openhands
  # Base URL of the running OpenHands server.
  # Override with env: OPENHANDS_BASE_URL
  base_url: "http://localhost:3000"
  model: claude-sonnet-4-20250514
  max_iterations: 30
  poll_interval_seconds: 5.0
  # How long (seconds) to wait for the OpenHands sandbox to initialize
  start_task_timeout_seconds: 120

sandbox:
  image: faultbench-sandbox:latest
  memory_limit: 512m
  cpu_quota: 50000          # 50% of one core
  max_runtime_seconds: 900  # 15 min hard cap per run

paths:
  db: db/faultbench.db
  logs: logs/
  reports: reports/
  tasks: tasks/

benchmark:
  # NOTE: Set to 1 for single-slice smoke testing.
  # Raise to >= 5 before collecting real benchmark data.
  min_runs_for_comparison: 1
  default_runs: 1
