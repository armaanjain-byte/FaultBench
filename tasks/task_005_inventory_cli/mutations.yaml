schema_drift:
  description: "Rename the 'name' field to 'product_name' in the inventory JSON structure"
  causal_path: >
    inventory.py and storage.py reference items by a 'name' key. Renaming
    it to 'product_name' in storage.py causes KeyError on add, search, and
    list operations, blocking the agent from testing the search fix.
  actions:
    - action: replace_string
      target: storage.py
      details:
        old_value: '"name"'
        new_value: '"product_name"'
  rollback_actions:
    - action: replace_string
      target: storage.py
      details:
        old_value: '"product_name"'
        new_value: '"name"'

dependency_drift:
  description: "Pin Click to a non-existent version >=99.0.0"
  causal_path: >
    cli.py uses Click to define the CLI interface. Pinning to a non-existent
    version makes pip install fail, preventing the agent from running the
    CLI or its tests.
  actions:
    - action: replace_string
      target: requirements.txt
      details:
        old_value: "click>=8.1"
        new_value: "click>=99.0.0"
  rollback_actions:
    - action: replace_string
      target: requirements.txt
      details:
        old_value: "click>=99.0.0"
        new_value: "click>=8.1"

config_corruption:
  description: "Set the storage path to a read-only system directory"
  causal_path: >
    config.yaml specifies the JSON file path for inventory data. Setting it
    to '/dev/null/inventory.json' (an invalid path) causes a write error
    when the agent tries to add items, preventing any functional testing
    of the search fix.
  actions:
    - action: replace_string
      target: config.yaml
      details:
        old_value: "storage_path: inventory_data.json"
        new_value: "storage_path: /dev/null/inventory.json"
  rollback_actions:
    - action: replace_string
      target: config.yaml
      details:
        old_value: "storage_path: /dev/null/inventory.json"
        new_value: "storage_path: inventory_data.json"

missing_file:
  description: "Delete storage.py which handles JSON file persistence"
  causal_path: >
    inventory.py imports load_inventory and save_inventory from storage.py.
    Without this file the CLI crashes on startup with ImportError. The agent
    must recreate the storage layer before it can test the search function.
  actions:
    - action: delete_file
      target: storage.py
  rollback_actions:
    - action: restore_file
      target: storage.py

api_contract_drift:
  description: "Change search_items return type from list[dict] to a generator"
  causal_path: >
    cli.py and the tests expect search_items to return a list. Changing it
    to yield results as a generator breaks code that calls len() on the
    result or indexes into it, requiring the agent to reconcile the
    interface before verifying the substring-match fix.
  actions:
    - action: replace_string
      target: inventory.py
      details:
        old_value: "    return results"
        new_value: "    yield from results"
  rollback_actions:
    - action: replace_string
      target: inventory.py
      details:
        old_value: "    yield from results"
        new_value: "    return results"
